# Локальная сборка — эквивалент build.bat
# Запускается из папки плагина: amxb build --manifest manifest.local.yml
# Компилирует amxmodx/scripting/*.sma и пакует всё в {name}.zip
# Структура архива: /{name}/addons/amxmodx/ + /README.md

name: VipModular

amxmodx:
  version: "1.10.5428"   # опционально; без указания берётся последняя версия

deps:
  - AmxxModularEcosystem/ParamsController@1.4.0

output:
  archive_name: "{name}.zip"
  amxmodx_path: "{name}/addons/amxmodx"   # плагин в корне архива с префиксом
  assets_path:  "{name}"                  # assets/ → {name}/ (модели, звуки и т.п.)
  readme: true                            # включить README.md → /README.md
  generate_ini: false                     # plugins.ini в дистрибутиве не нужен