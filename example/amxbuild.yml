# yaml-language-server: $schema=https://raw.githubusercontent.com/AmxxModularEcosystem/amxx-builder/master/schema/amxbuild.schema.json

name: MyServer
version: "1.0.0"

# ── Компилятор ────────────────────────────────────────────────────────────────
# version не указан → берётся последний релиз автоматически
# dir — имя папки в каждом репо, где лежит amxmodx-контент (дефолт: amxmodx)
amxmodx:
  version: "1.10.5428"
  dir: amxmodx

# ── GitHub ────────────────────────────────────────────────────────────────────
github:
  token_env: GITHUB_TOKEN   # имя env-переменной с PAT; не нужен для публичных репо

# ── Глобальные зависимости ────────────────────────────────────────────────────
# Выигрывают над DEPS_LIST из любого репо
deps:
  # Краткая форма — клонирует репо (git), берёт .inc из scripting/include или include/
  - AmxxModularEcosystem/ParamsController@1.4.0
  - Next21Team/AmxxEasyHttp@1.4.0:amxx/scripting/include

  # Полная форма — скачать release-архив с GitHub
  - repo: rehlds/ReAPI
    ref: latest               # 'latest' или конкретный тег
    source: release           # скачать release-asset вместо git clone
    include_path: addons/amxmodx/scripting/include
    # asset: "*.zip"          # необязательно: glob-паттерн имени файла (дефолт: первый .zip)

# ── Имя ini-файла: plugins-{postfix}.ini ─────────────────────────────────────
plugins_ini_postfix: myserver

# ── Репозитории ───────────────────────────────────────────────────────────────
repos:
  # Краткая форма — берётся default branch, папка amxmodx/
  - AmxxModularEcosystem/CommandAliases

  # Полная форма
  - repo: AmxxModularEcosystem/VipModular
    ref: 5.0.0-rc4f1      # ветка, тег или SHA; "latest" → последний GitHub release
    amxmodx_dir: amxmodx  # переопределяет amxmodx.dir для этого репо
    plugins_ini_postfix: vip
    deps_override:        # если задан — DEPS_LIST из репо игнорируется
      - AmxxModularEcosystem/VipModular@5.0.0-rc4f1

  - repo: AmxxModularEcosystem/CustomWeaponsAPI
    ref: latest           # автоматически берёт тег последнего релиза
    exclude:
      - "CWAPI-A-Test.sma"

# ── Выходной архив ────────────────────────────────────────────────────────────
output:
  dir: ./dist
  archive_name: "{name}-{version}.zip"
  amxmodx_path: addons/amxmodx   # куда ложится содержимое amxmodx/ в архиве
  generate_ini: true             # сгенерировать plugins[-postfix].ini (дефолт: true)
  on_conflict: last_wins         # поведение при конфликте файлов между репо:
                                 #   last_wins  — последний репо побеждает (дефолт, варн)
                                 #   first_wins — первый репо побеждает (варн)
                                 #   error      — упасть при первом конфликте
