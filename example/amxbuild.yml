# yaml-language-server: $schema=https://raw.githubusercontent.com/AmxxModularEcosystem/amxx-builder/master/schema/amxbuild.schema.json

name: MyServer
version: "1.0.0"
platform: linux    # целевая платформа сервера (linux/windows/mac, default: хост)

# ── Компилятор ────────────────────────────────────────────────────────────────
# version не указан → берётся последний релиз автоматически
# dir — имя папки в каждом репо, где лежит amxmodx-контент (дефолт: amxmodx)
amxmodx:
  version: "1.10.5428"
  dir: amxmodx

# ── GitHub ────────────────────────────────────────────────────────────────────
github:
  token_env: GITHUB_TOKEN   # имя env-переменной с PAT; не нужен для публичных репо

# ── Глобальные зависимости ────────────────────────────────────────────────────
# Выигрывают над DEPS_LIST из любого репо
deps:
  # Краткая форма — клонирует репо (git), берёт .inc из scripting/include или include/
  - AmxxModularEcosystem/ParamsController@1.4.0
  - Next21Team/AmxxEasyHttp@1.4.0:amxx/scripting/include

  # Полная форма — скачать release-архив с GitHub
  - repo: rehlds/ReAPI
    ref: latest               # 'latest' или конкретный тег
    source: release           # скачать release-asset вместо git clone
    include_path: addons/amxmodx/scripting/include
    # asset: "*.zip"          # необязательно: glob-паттерн имени файла (дефолт: первый .zip)

# ── Имя ini-файла: plugins-{postfix}.ini ─────────────────────────────────────
plugins_ini_postfix: myserver

# ── Репозитории ───────────────────────────────────────────────────────────────
repos:
  # Краткая форма — берётся default branch, папка amxmodx/
  - AmxxModularEcosystem/CommandAliases

  # Полная форма
  - repo: AmxxModularEcosystem/VipModular
    ref: 5.0.0-rc4f1      # ветка, тег или SHA; "latest" → последний GitHub release
    amxmodx_dir: amxmodx  # переопределяет amxmodx.dir для этого репо
    plugins_ini_postfix: vip
    deps_override:        # если задан — DEPS_LIST из репо игнорируется
      - AmxxModularEcosystem/VipModular@5.0.0-rc4f1

  - repo: AmxxModularEcosystem/CustomWeaponsAPI
    ref: latest           # автоматически берёт тег последнего релиза
    exclude:
      - "CWAPI-A-Test.sma"

# ── Деплой (опционально) ──────────────────────────────────────────────────────
# Значения по умолчанию берутся из .env (gitignored):
#   AMXB_DEPLOY_PATH, AMXB_DEPLOY_RCON_HOST, AMXB_DEPLOY_RCON_PASSWORD и т.д.
# Поддерживается интерполяция ${VAR} из env.
#
# deploy:
#   path: /home/user/server           # или ${AMXB_DEPLOY_PATH}
#   amxmodx_path: addons/amxmodx      # default: output.amxmodx_path
#   watch_debounce_ms: 500            # мс стабильности файла перед ребилдом
#   exclude:                          # пути от deploy.path, которые не перезаписываются
#     - addons/amxmodx/configs/       # вся папка configs
#     - addons/amxmodx/configs/amxx.cfg
#   rcon:
#     host: 127.0.0.1
#     port: 27015
#     password: ${RCON_PASSWORD}
#     command: "amxx load {plugin}"   # {plugin} = имя без .amxx; пусто = не слать

# ── Ассеты ────────────────────────────────────────────────────────────────────
# Локальные ассеты (папка assets/ рядом с манифестом) всегда перекрывают удалённые.
assets:
  on_conflict: last_wins   # среди удалённых источников (last_wins / first_wins)

  sources:
    # Базовый amxmodx — использует platform и amxmodx.version выше
    - source: amxmodx
      map:
        - from: addons/amxmodx/modules/
          to: addons/amxmodx/modules/
        - from: addons/amxmodx/plugins/
          to: addons/amxmodx/plugins/

    # Архив по URL: всё содержимое → корень ассетов
    - url: https://cdn.example.com/map-pack.zip
      cache: local           # кэш рядом с манифестом в .amxb-cache/

    # Архив: взять подпапку, положить в конкретное место
    - url: https://cdn.example.com/full-pack.zip
      cache: global
      map:
        - from: resource/models/     # содержимое папки → models/
          to: models/
        - from: resource/sound/      # содержимое папки → sound/
          to: sound/

    # Одиночный файл → в указанную папку
    - url: https://cdn.example.com/weapon.wav
      to: sound/weapons/

    # Одиночный файл с переименованием
    - url: https://cdn.example.com/pistol_v2.mdl
      to: models/v_pistol.mdl

    # GitHub release asset — использует тот же кэш, что и deps
    # Если этот же релиз уже используется в deps, файл не будет скачан повторно
    - source: release
      repo: org/weapon-pack
      ref: v2.0.0
      asset: "weapon-models.zip"   # glob-паттерн имени файла (опционально)
      map:
        - from: models/
          to: models/
        - from: sound/
          to: sound/

# ── Выходной архив ────────────────────────────────────────────────────────────
output:
  dir: ./dist
  archive_name: "{name}-{version}.zip"
  amxmodx_path: addons/amxmodx   # куда ложится содержимое amxmodx/ в архиве
  generate_ini: true             # сгенерировать plugins[-postfix].ini (дефолт: true)
  on_conflict: last_wins         # поведение при конфликте файлов между репо:
                                 #   last_wins  — последний репо побеждает (дефолт, варн)
                                 #   first_wins — первый репо побеждает (варн)
                                 #   error      — упасть при первом конфликте
