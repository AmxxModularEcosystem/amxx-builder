# Локальная сборка — эквивалент build.bat
# Запускается из папки плагина: amxb build --manifest amxbuild.local.yml
# Компилирует amxmodx/scripting/*.sma и пакует всё в {name}.zip
# Структура архива: /{name}/addons/amxmodx/ + /{name}/ (assets) + README.md
#
# Дефолты уже обеспечивают:
#   archive_name: "{name}.zip"
#   amxmodx_path: "{name}/addons/amxmodx"
#   assets_path:  "{name}"
#   readme: true
#   generate_ini: false

name: ExampleLocal

amxmodx:
  version: "1.10.5428"   # опционально; без указания берётся последняя версия

deps:
  - AmxxModularEcosystem/ParamsController@1.4.0
